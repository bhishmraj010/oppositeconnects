<!DOCTYPE html>
<html>
<head>
<title>OppositeConnect</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
color:white;

background:linear-gradient(270deg,#667eea,#764ba2,#6b8cff,#8e54e9);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
}

.logo{
font-size:30px;
font-weight:bold;
}

.login-btn{
background:white;
color:black;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 1.5s ease;
}

.hero h1{
font-size:65px;
font-weight:700;
margin-bottom:15px;
}

.hero p{
font-size:22px;
margin-bottom:40px;
opacity:0.9;
}

.cta{
width:260px;
font-size:18px;
padding:15px;
margin:10px;
border-radius:12px;
transition:0.3s;
}

.cta:hover{
transform:scale(1.1);
box-shadow:0 12px 40px rgba(0,0,0,0.4);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 10s infinite ease-in-out;
}

.circle1{
width:120px;
height:120px;
top:80%;
left:10%;
}

.circle2{
width:80px;
height:80px;
top:10%;
right:15%;
}

.circle3{
width:60px;
height:60px;
bottom:10%;
right:25%;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-60px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="header">

<div class="logo">
OppositeConnect
</div>

<a href="/profile/" class="login-btn">
Login / Sign Up
</a>

</div>

<div class="hero">

<h1>
Meet New People Instantly
</h1>

<p>
Start random video chat with strangers around the world
</p>

<a href="/profile/" class="btn btn-success cta">
Start Video Call
</a>

<a href="/profile/" class="btn btn-warning cta">
Next Call
</a>

<a href="/profile/" class="btn btn-light cta">
Sign in with Google
</a>

</div>

</body>
</html>
