<!DOCTYPE html>
<html>
<head>
<title>WebRTC Video Chat</title>

<style>
body{margin:0;background:black;overflow:hidden;}

#remoteVideo{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
}

#localVideo{
position:fixed;
bottom:20px;
right:20px;
width:200px;height:150px;
border:2px solid white;
border-radius:10px;
z-index:2;
}

.controls{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
z-index:3;
}

.control-btn{
width:65px;
height:65px;
border-radius:50%;
border:none;
font-size:22px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.control-btn:hover{
transform:scale(1.2);
box-shadow:0 0 20px rgba(255,255,255,0.6);
}

.mic{background:#3b82f6;}
.cam{background:#8b5cf6;}
.skip{background:#facc15;}
.exit{background:#ef4444;}

.toast{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:white;
padding:12px 25px;
border-radius:20px;
opacity:0;
transition:0.5s;
z-index:999;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay muted playsinline></video>

<div class="controls">
<button class="control-btn mic" onclick="toggleMic()">🎤</button>
<button class="control-btn cam" onclick="toggleCam()">📷</button>
<button class="control-btn skip" onclick="skipUser()">⏭</button>
<button class="control-btn exit" onclick="exitChat()">❌</button>
</div>

<div id="toast" class="toast"></div>

<script>

let localStream;
let peer;
let socket = new WebSocket("ws://localhost:8000/ws/video/");

let micOn = true;
let camOn = true;

// 🎥 START CAMERA
async function start(){
localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("localVideo").srcObject = localStream;
createPeer();
}

function createPeer(){
peer = new RTCPeerConnection();

localStream.getTracks().forEach(track=>{
peer.addTrack(track, localStream);
});

peer.ontrack = event=>{
document.getElementById("remoteVideo").srcObject = event.streams[0];
};

peer.onicecandidate = event=>{
if(event.candidate){
socket.send(JSON.stringify({
type:"candidate",
candidate:event.candidate
}));
}
};
}

// SOCKET
socket.onmessage = async (event)=>{
let data = JSON.parse(event.data);

if(data.type==="offer"){
await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
let answer = await peer.createAnswer();
await peer.setLocalDescription(answer);

socket.send(JSON.stringify({
type:"answer",
answer:answer
}));
}

if(data.type==="answer"){
await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
}

if(data.type==="candidate"){
try{await peer.addIceCandidate(data.candidate);}catch(e){}
}
};

// CALL
async function call(){
let offer = await peer.createOffer();
await peer.setLocalDescription(offer);

socket.send(JSON.stringify({
type:"offer",
offer:offer
}));
}

// TOAST
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

// MIC
function toggleMic(){
if(!localStream) return;
micOn=!micOn;
localStream.getAudioTracks()[0].enabled=micOn;
showToast(micOn?"🎤 Mic ON":"🔇 Mic OFF");
}

// CAM
function toggleCam(){
if(!localStream) return;
camOn=!camOn;
localStream.getVideoTracks()[0].enabled=camOn;
showToast(camOn?"📷 Camera ON":"🚫 Camera OFF");
}

// ⏭ SKIP (SAFE VERSION)
function skipUser(){
showToast("⏭ Skip disabled (needs backend logic)");
}

// EXIT
function exitChat(){
if(localStream){
localStream.getTracks().forEach(t=>t.stop());
}
window.location.href="/";
}



</script>

</body>
</html>

<!-- COMMUNITY GUIDELINES MODAL -->
<div id="ageModal" class="modal-overlay">
    
    <div class="modal-box">
        <h2>Community Guidelines</h2>

        <p>
            Please be respectful while using this platform.  
            Any inappropriate behavior is strictly discouraged.  
            If anything inappropriate happens, the user will be responsible.
        </p>

        <div class="buttons">
            <button class="btn-red" onclick="under18()">I am under 18</button>
            <button class="btn-green" onclick="above18()">I am 18 or above</button>
        </div>
    </div>

</div>

<style>
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.7);

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 999;
}

.modal-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
}

.modal-box h2 {
    margin-bottom: 15px;
}

.modal-box p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

.buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.btn-red {
    background: red;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-green {
    background: green;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}
</style>

<script>



function under18() {
    alert("You must be 18+ to use this platform.");
    window.location.href = "/";
}

function above18() {
    document.getElementById("ageModal").style.display = "none";

    start();                 // ✅ your original function
    setTimeout(call,2000);   // ✅ connection logic
}


</script>
