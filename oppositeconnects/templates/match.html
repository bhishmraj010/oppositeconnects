<!DOCTYPE html>
<html>

<head>

<title>Finding Match | OppositeConnects</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

.match-card{
background:white;
color:black;
padding:40px;
width:420px;
border-radius:15px;
text-align:center;
box-shadow:0px 10px 35px rgba(0,0,0,0.5);
}

h1{
margin-bottom:15px;
font-weight:bold;
}

.partner-name{
font-size:24px;
color:#2a5298;
font-weight:bold;
margin-top:10px;
}

.btn-start{
margin-top:25px;
padding:12px 30px;
font-size:18px;
border-radius:10px;
}

.btn-try{
margin-top:20px;
}

.spinner{
margin-top:15px;
}

</style>

</head>

<body>

<div class="match-card">

<h1>Finding a Partner</h1>

<div class="spinner">
<div class="spinner-border text-primary"></div>
</div>

{% if partner %}

<p class="mt-3">You are connected with:</p>

<div class="partner-name">
{{ partner.name }}
</div>

<a href="/video/">

<button class="btn btn-success btn-start">
Start Video Chat
</button>

</a>

{% else %}

<p class="mt-3">No partner available right now.</p>

<a href="/dashboard/">

<button class="btn btn-primary btn-try">
Try Again
</button>

</a>

{% endif %}

</div>

</body>

</html>
