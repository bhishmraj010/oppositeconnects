<!DOCTYPE html>
<html>

<head>
<title>OppositeConnects</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
padding:20px;
}

.container-box{
text-align:center;
width:100%;
max-width:400px;
}

h1{
margin-bottom:40px;
font-size:clamp(22px, 6vw, 32px);
}

.btn-match, .btn-friends{
width:100%;
max-width:280px;
padding:15px 40px;
font-size:20px;
border-radius:10px;
}

@media (max-width:480px){
  .btn-match, .btn-friends{ font-size:17px; padding:13px 25px; }
}

</style>

</head>

<body>

<div class="container-box">

<h1>Welcome to OppositeConnects</h1>

<a href="/match/">
<button class="btn btn-warning btn-match">Find Random Match</button>
</a>

<br>

<a href="/friends/">
<button class="btn btn-outline-light btn-friends">👥 My Friends</button>
</a>

</div>

</body>

</html>
