<!DOCTYPE html>
<html>
<head>

<title>OppositeConnects - Create Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.card-box{
background:white;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.google-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px;
background:white;
border:1px solid #ddd;
border-radius:8px;
text-decoration:none;
font-weight:600;
color:black;
margin-bottom:20px;
transition:0.2s;
}

.google-btn:hover{
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.save-btn{
width:100%;
margin-top:15px;
}

.divider{
text-align:center;
margin:15px 0;
color:#777;
}

</style>

</head>


<body>

<div class="card-box">

<h2 class="text-center mb-3">Create Profile</h2>


<!-- Google Login Button -->

<a href="/accounts/google/login/" class="google-btn">

<img src="https://developers.google.com/identity/images/g-logo.png" width="20">

Continue with Google

</a>


<div class="divider">OR</div>


<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Name</label>

<input type="text" name="name" class="form-control" required>

</div>


<div class="mb-3">

<label>City</label>

<input type="text" name="city" class="form-control" required>

</div>


<div class="mb-3">

<label>Gender</label>

<select name="gender" class="form-control" required>

<option value="">Select Gender</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

<option value="Other">Other</option>

</select>

</div>


<div class="mb-3">

<label>Age</label>

<input type="number" name="age" class="form-control" required>

</div>


<button class="btn btn-primary save-btn">

Save Profile

</button>

</form>

</div>

</body>
</html>
